name: Publish to PyPI

# Publishes langchain-relm to PyPI whenever a GitHub Release is published.
# Uses PyPI Trusted Publishing (OIDC) - NO API token is stored anywhere.
# One-time setup on PyPI: project langchain-relm -> Manage -> Publishing ->
# Add a GitHub publisher (owner: 98000m, repo: langchain-relm, workflow: publish.yml).
# To ship a new version: bump `version` in pyproject.toml, tag, then cut a GitHub Release.

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
